name: MFL Moneyball Sync

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2am UTC
  workflow_dispatch:       # Also keep manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour GitHub limit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run MFL sync
        env:
          MFL_REFRESH_TOKEN: ${{ secrets.MFL_REFRESH_TOKEN }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
        run: python scripts/mfl_sync.py
